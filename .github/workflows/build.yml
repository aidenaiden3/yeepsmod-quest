name: Build YeepsMod Quest

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Install apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O apktool
          chmod +x apktool
          sudo mv apktool /usr/local/bin/
          sudo mv apktool.jar /usr/local/bin/

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.1'

      - name: Generate wrapper
        run: gradle wrapper --gradle-version 8.1

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build our mod APK
        run: ./gradlew assembleRelease

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore keystore.jks \
            -alias yeepsmod -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass yeepsmod123 \
            -keypass yeepsmod123 \
            -dname "CN=YeepsMod, OU=Dev, O=YeepsMod, L=US, S=US, C=US"

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:yeepsmod123 \
            --key-pass pass:yeepsmod123 \
            --ks-key-alias yeepsmod \
            --out app/build/outputs/apk/release/YeepsMod-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YeepsMod-Quest
          path: app/build/outputs/apk/release/YeepsMod-signed.apk
