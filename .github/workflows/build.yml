name: Build YeepsMod Quest

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.1'

      - name: Generate wrapper
        run: gradle wrapper --gradle-version 8.1

      - name: Make gradlew executable
        run: chmod +x gradlew
        
      - name: Download ADB binary for ARM64
        run: |
          mkdir -p app/src/main/assets
          wget -q https://github.com/rendiix/termux-adb/releases/download/v1.0.3/adb-arm64-v8a -O app/src/main/assets/adb

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore keystore.jks \
            -alias yeepsmod -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass yeepsmod123 \
            -keypass yeepsmod123 \
            -dname "CN=YeepsMod, OU=Dev, O=YeepsMod, L=US, S=US, C=US"

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:yeepsmod123 \
            --key-pass pass:yeepsmod123 \
            --ks-key-alias yeepsmod \
            --out YeepsMod-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YeepsMod-Quest
          path: YeepsMod-signed.apk
