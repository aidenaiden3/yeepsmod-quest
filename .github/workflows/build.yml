name: Build YeepsMod Quest

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Install apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /usr/local/bin/apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool

      - name: Decompile OVR APK
        run: |
          apktool d "OVR Metrics Tool_85.1.0.0.25.apk" -o ovr_decoded --force

      - name: Inject YeepsMod activity
        run: |
          mkdir -p ovr_decoded/smali/com/yeepsmod
          cat > ovr_decoded/smali/com/yeepsmod/ModActivity.smali << 'EOF'
          .class public Lcom/yeepsmod/ModActivity;
          .super Landroid/app/Activity;

          .method public constructor <init>()V
              .registers 1
              invoke-direct {p0}, Landroid/app/Activity;-><init>()V
              return-void
          .end method

          .method public onCreate(Landroid/os/Bundle;)V
              .registers 2
              invoke-super {p0, p1}, Landroid/app/Activity;->onCreate(Landroid/os/Bundle;)V
              return-void
          .end method
          EOF

      - name: Add activity to manifest
        run: |
          python3 << 'PYEOF'
          import re
          with open('ovr_decoded/AndroidManifest.xml', 'r') as f:
              content = f.read()

      - name: Change package name
        run: |
          python3 << 'PYEOF'
          with open('ovr_decoded/AndroidManifest.xml', 'r') as f:
              content = f.read()
          content = content.replace(
              'com.oculus.ovrmonitormetricsservice',
              'com.yeepsmod.ovroverlay'
          )
          with open('ovr_decoded/AndroidManifest.xml', 'w') as f:
              f.write(content)
          print("Package name changed!")
          PYEOF
          
          new_activity = '''
              <activity
                  android:name="com.yeepsmod.ModActivity"
                  android:exported="true"
                  android:label="YeepsMod">
                  <intent-filter>
                      <action android:name="android.intent.action.MAIN"/>
                      <category android:name="android.intent.category.LAUNCHER"/>
                      <category android:name="com.oculus.intent.category.2D"/>
                  </intent-filter>
              </activity>'''
          
          content = content.replace('</application>', new_activity + '\n</application>')
          with open('ovr_decoded/AndroidManifest.xml', 'w') as f:
              f.write(content)
          print("Manifest updated!")
          PYEOF

      - name: Recompile OVR APK
        run: |
          apktool b ovr_decoded -o yeepsmod_ovr_unsigned.apk

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore keystore.jks \
            -alias yeepsmod -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass yeepsmod123 \
            -keypass yeepsmod123 \
            -dname "CN=YeepsMod, OU=Dev, O=YeepsMod, L=US, S=US, C=US"

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:yeepsmod123 \
            --key-pass pass:yeepsmod123 \
            --ks-key-alias yeepsmod \
            --out YeepsMod-OVR.apk \
            yeepsmod_ovr_unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YeepsMod-OVR
          path: YeepsMod-OVR.apk
